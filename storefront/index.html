<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Takhayir — a multi-vendor marketplace for fashion, electronics, home goods and more, all from independent stores in one place." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Takhayir — Shop from every vendor</title>
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: #faf9fc;
        transition: opacity 0.45s ease, visibility 0.45s ease;
      }
      #app-loader.loader-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .loader-mark {
        width: 68px;
        height: auto;
        animation: loader-pulse 1.3s ease-in-out infinite;
        filter: drop-shadow(0 6px 18px rgba(106, 44, 224, 0.3));
      }
      .loader-word {
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        font-weight: 800;
        font-size: 20px;
        letter-spacing: 0.01em;
        background: linear-gradient(135deg, #f9622c, #d6247a 55%, #6a2ce0);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      @keyframes loader-pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.08);
          opacity: 0.82;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <img src="/favicon.svg" alt="Takhayir" class="loader-mark" />
      <span class="loader-word">Takhayir</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
