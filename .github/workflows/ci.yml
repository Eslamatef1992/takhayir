name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [backend, storefront, admin-panel, vendor-panel]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm install
      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build
